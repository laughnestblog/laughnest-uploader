<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaughNest Image Uploader</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f1115;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:25px;
}

.container{
    width:100%;
    max-width:760px;
    background:#181b22;
    border:1px solid #2a2f38;
    border-radius:18px;
    padding:30px;
    box-shadow:0 12px 35px rgba(0,0,0,.35);
}

h1{
    text-align:center;
    color:#FFC107;
    font-size:30px;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin-bottom:25px;
}

#drop-area{
    border:2px dashed #555;
    border-radius:16px;
    padding:50px 20px;
    text-align:center;
    cursor:pointer;
    transition:.25s;
}

#drop-area:hover{
    border-color:#FFC107;
    background:#20242c;
}

#drop-area .icon{
    font-size:55px;
    margin-bottom:15px;
}

#drop-area h2{
    font-size:24px;
    margin-bottom:10px;
}

#drop-area span{
    color:#aaa;
}

input{
    display:none;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#FFC107;
    color:#111;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    transform:translateY(-2px);
}

#preview{
    margin-top:25px;
    text-align:center;
}

#preview img{
    max-width:100%;
    border-radius:14px;
    margin-top:15px;
}

.action-buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.action-buttons button{
    flex:1;
}
</style>

</head>
<body>

<div class="container">

<h1>😂 LaughNest Image Uploader</h1>

<p>Drag & Drop or Click to Upload Image</p>

<label id="drop-area">

<div class="icon">☁️</div>

<h2>Upload Your Image</h2>

<p class="upload-text">
Drag & Drop or Click to Browse
</p>

<span>Supports PNG, JPG & WEBP</span>

<input type="file" id="file" accept="image/*">

</label>

<div class="preview" id="preview">

<img id="image">

<br>

<button id="download">Download Image</button>

</div>

</div>

<script>
const CLOUD_NAME = "fyu5xouf";
const UPLOAD_PRESET = "laughnest";

const file = document.getElementById("file");
const area = document.getElementById("drop-area");
const preview = document.getElementById("preview");
const image = document.getElementById("image");
const download = document.getElementById("download");

area.onclick = () => file.click();
file.onchange = uploadImage;

async function uploadImage() {
  const f = file.files[0];
  if (!f) return;

  // Preview
  image.src = URL.createObjectURL(f);
  preview.style.display = "block";

  // Cloudinary Upload
  const data = new FormData();
  data.append("file", f);
  data.append("upload_preset", "laughnest");

  download.innerText = "Uploading...";
  download.disabled = true;

  try {
    const res = await fetch(
      `https://api.cloudinary.com/v1_1/fyu5xouf/image/upload`,
      {
        method: "POST",
        body: data
      }
    );

    const result = await res.json();

    if (result.secure_url) {
      download.innerText = "Copy HTML";
      download.disabled = false;

      const html = `<img src="${result.secure_url}" alt="LaughNest Image" loading="lazy" style="max-width:100%;height:auto;">`;

navigator.clipboard.writeText(html);

download.innerText = "✅ HTML Auto Copied";

      download.onclick = async () => {
    const html = `<img src="${result.secure_url}" alt="LaughNest Image" loading="lazy" style="max-width:100%;height:auto;">`;

    await navigator.clipboard.writeText(html);

    download.innerText = "✅ HTML Copied";
    download.style.background = "#28a745";

    setTimeout(() => {
        download.innerText = "Copy HTML";
        download.style.background = "";
    }, 2000);
};
    } else {
      alert("Upload failed!");
      console.log(result);
    }

  } catch (err) {
    alert("Error uploading image.");
    console.error(err);
  }
}
</script>

</body>
</html>
