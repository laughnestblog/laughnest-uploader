<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaughNest Image Uploader</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:700px;
background:#1b1b1b;
padding:30px;
border-radius:18px;
border:2px solid #ffc107;
box-shadow:0 0 20px rgba(255,193,7,.25);
}

h1{
text-align:center;
color:#ffc107;
margin-bottom:10px;
}

p{
text-align:center;
color:#ddd;
margin-bottom:25px;
}

#drop-area{
border:3px dashed #ffc107;
border-radius:15px;
padding:50px 20px;
text-align:center;
cursor:pointer;
transition:.3s;
}

#drop-area:hover{
background:#222;
}

#drop-area h2{
font-size:22px;
color:#ffc107;
margin-bottom:10px;
}

#drop-area span{
color:#aaa;
font-size:14px;
}

input{
display:none;
}

.preview{
margin-top:25px;
display:none;
text-align:center;
}

.preview img{
max-width:100%;
border-radius:12px;
border:2px solid #ffc107;
}

button{
margin-top:20px;
padding:12px 20px;
border:none;
background:#ffc107;
color:#111;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#ffdb4d;
}
</style>

</head>
<body>

<div class="container">

<h1>😂 LaughNest Image Uploader</h1>

<p>Drag & Drop or Click to Upload Image</p>

<label id="drop-area">

<h2>📤 Upload Image</h2>

<span>PNG • JPG • WEBP</span>

<input type="file" id="file" accept="image/*">

</label>

<div class="preview" id="preview">

<img id="image">

<br>

<button id="download">Download Image</button>

</div>

</div>

<script>
const CLOUD_NAME = "fyu5xouf";
const UPLOAD_PRESET = "laughnest";

const file = document.getElementById("file");
const area = document.getElementById("drop-area");
const preview = document.getElementById("preview");
const image = document.getElementById("image");
const download = document.getElementById("download");

area.onclick = () => file.click();
file.onchange = uploadImage;

async function uploadImage() {
  const f = file.files[0];
  if (!f) return;

  // Preview
  image.src = URL.createObjectURL(f);
  preview.style.display = "block";

  // Cloudinary Upload
  const data = new FormData();
  data.append("file", f);
  data.append("upload_preset", "laughnest");

  download.innerText = "Uploading...";
  download.disabled = true;

  try {
    const res = await fetch(
      `https://api.cloudinary.com/v1_1/fyu5xouf/image/upload`,
      {
        method: "POST",
        body: data
      }
    );

    const result = await res.json();

    if (result.secure_url) {
      download.innerText = "Copy HTML";
      download.disabled = false;

      const html = `<img src="${result.secure_url}" alt="LaughNest Image" loading="lazy" style="max-width:100%;height:auto;">`;

navigator.clipboard.writeText(html);

download.innerText = "✅ HTML Auto Copied";

      download.onclick = async () => {
    const html = `<img src="${result.secure_url}" alt="LaughNest Image" loading="lazy" style="max-width:100%;height:auto;">`;

    await navigator.clipboard.writeText(html);

    download.innerText = "✅ HTML Copied";
    download.style.background = "#28a745";

    setTimeout(() => {
        download.innerText = "Copy HTML";
        download.style.background = "";
    }, 2000);
};
    } else {
      alert("Upload failed!");
      console.log(result);
    }

  } catch (err) {
    alert("Error uploading image.");
    console.error(err);
  }
}
</script>

</body>
</html>
